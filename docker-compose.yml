services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      POSTGRES_DB: sales_warehouse
    ports:
      - "5433:5432"
  app:
    build: .
    command: uvicorn sales_retention_analytics_warehouse.api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    environment:
      ENVIRONMENT: local
    depends_on:
      - postgres
  dashboard:
    build: .
    command: streamlit run dashboard/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    volumes:
      - .:/app
    ports:
      - "8502:8501"
    depends_on:
      - app
